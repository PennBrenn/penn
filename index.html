<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Image Viewer</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #img {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            display: block;
        }

        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            font-family: sans-serif;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="status">Loading...</div>
    <img id="img" alt="Live Image">

    <script>
        const baseUrl =
            "https://wicjtrkkudwbjmmbkfaa.supabase.co/storage/v1/object/public/studypenn/latest.jpg";

        const img = document.getElementById("img");
        const status = document.getElementById("status");

        function refreshImage() {
            img.src = `${baseUrl}?t=${Date.now()}`;
        }

        img.onload = () => {
            status.textContent =
                "Updated: " + new Date().toLocaleTimeString();
        };

        img.onerror = () => {
            status.textContent = "Failed to load image";
        };

        refreshImage();
        setInterval(refreshImage, 1000);
    </script>

</body>
</html>
