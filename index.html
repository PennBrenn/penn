<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PENN BRENN: VICTORIAN CHILD ANNIHILATOR</title>
<style>
  /* --- THE WHITE ROOM --- */
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; cursor: crosshair; }

  #countdown-screen {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: white; display: flex; align-items: center; justify-content: center;
    z-index: 9999999;
  }
  #countdown-text { font-size: 300px; font-family: "Impact", sans-serif; color: black; }

  /* --- DA CHAOS REALM --- */
  #chaos-realm {
    display: none; width: 100vw; height: 100vh;
    background: #000; font-family: "Comic Sans MS", cursive;
    animation: worldEnd 0.05s infinite;
  }

  @keyframes worldEnd {
    0% { background: #ff00ff; filter: hue-rotate(0deg); }
    50% { background: #00ffff; filter: hue-rotate(180deg); }
    100% { background: #ffff00; filter: hue-rotate(360deg); }
  }

  /* --- VICTORIAN RETINA DESTROYER --- */
  .moire-hell {
    position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
    background: repeating-radial-gradient(circle, #000, #000 12px, #fff 12px, #fff 24px);
    mix-blend-mode: difference;
    animation: spinHell 2s linear infinite, throb 0.2s infinite alternate;
    z-index: 0; pointer-events: none;
  }
  @keyframes spinHell { 100% { transform: rotate(360deg); } }
  @keyframes throb { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

  /* --- EPILEPSY WARNING --- */
  #seizure-warning {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 999999; background: black; color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 100px; text-align: center; font-weight: 900;
    animation: warningFlash 0.05s infinite; pointer-events: none;
  }
  @keyframes warningFlash {
    0% { opacity: 1; background: red; color: yellow; transform: scale(1.2); }
    50% { opacity: 0.5; background: blue; color: lime; transform: scale(0.8) rotate(5deg); }
  }

  /* --- HUD ELEMENTS --- */
  #death-timer {
    position: fixed; top: 10px; right: 10px;
    background: white; color: black; font-size: 60px; padding: 10px;
    border: 15px double red; z-index: 10000; animation: jitter 0.05s infinite;
  }

  marquee {
    position: fixed; font-size: 150px; opacity: 0.8; z-index: 1; 
    pointer-events: none; color: lime; mix-blend-mode: exclusion;
  }

  /* --- THE EASY-CLICK BUTTONS OF DOOM --- */
  .file-link {
    position: absolute; padding: 20px;
    background: rgba(255,255,255,0.9);
    border: 8px solid black; text-decoration: none;
    color: red; font-weight: 900; font-size: 24px;
    z-index: 100; transition: all 0.1s ease;
    box-shadow: 10px 10px 0px blue;
  }

  /* Now they swell up massive instead of running away */
  .file-link:hover {
    transform: scale(3.5) rotate(10deg);
    background: #00ff00; color: #ff00ff;
    border: 15px dashed black;
    z-index: 100000;
    box-shadow: -20px -20px 0px red;
  }

  @keyframes jitter {
    0% { transform: translate(0,0); }
    50% { transform: translate(20px, -20px); }
    100% { transform: translate(-20px, 20px); }
  }
</style>
</head>
<body>

<div id="countdown-screen">
  <div id="countdown-text">5</div>
</div>

<div id="chaos-realm">
  <div class="moire-hell"></div>

  <div id="seizure-warning">
      !!!!! RETINA ANNIHILATOR !!!!!<br>
      CLICK 2 DIEEEE
  </div>

  <div id="death-timer">TIME LEFT: <span id="time">10</span></div>

  <marquee scrollamount="90" style="top:10%;">U CANNOT COMPREHEND DIS</marquee>
  <marquee scrollamount="70" direction="right" style="bottom:15%;">MULTIPLE TABS INCOMING</marquee>

  <div id="directory-container"></div>
</div>

<script>
  let userInteracted = false;
  document.body.addEventListener('click', () => { userInteracted = true; });

  // --- 1. COUNTDOWN ---
  let count = 5;
  const countText = document.getElementById('countdown-text');
  const countdownInterval = setInterval(() => {
    count--;
    if (count > 0) countText.innerText = count;
    else {
      clearInterval(countdownInterval);
      document.getElementById('countdown-screen').style.display = 'none';
      document.getElementById('chaos-realm').style.display = 'block';
      if (userInteracted) {
        startAudioTorture();
        setInterval(spawnPopupWindows, 1000); // Faster popups!
      }
      buildDirectory();
      startDeathTimer();
      setTimeout(() => { document.getElementById('seizure-warning').style.display = 'none'; }, 3000);
    }
  }, 1000);

  // --- 2. AUDIO SYNTH ---
  function startAudioTorture() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'square'; // Changed to square wave for harsher 8-bit screech
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    gainNode.gain.value = 0.8; 
    osc.start();
    setInterval(() => {
      osc.frequency.setValueAtTime(Math.random() * 4000 + 100, audioCtx.currentTime);
    }, 30);
  }

  // --- 3. POPUP SPAM ---
  const popupUrls = ["https://pennbrenn.com/examguard.html", "https://pennbrenn.com/randombullshitattack.png"];
  function spawnPopupWindows() {
    const url = popupUrls[Math.floor(Math.random() * popupUrls.length)];
    window.open(url, '_blank', `width=${Math.random()*400+100},height=${Math.random()*400+100},left=${Math.random()*800},top=${Math.random()*600}`);
  }
  document.getElementById('chaos-realm').addEventListener('click', spawnPopupWindows);

  // --- 4. DIRECTORY & MULTI-TAB CLICK LOGIC ---
  const files = [
    { name: "indux.htlm", url: "https://pennbrenn.com/index.html", desc: "da mane page 4 chaos" },
    { name: "exxam_gard.hmtl", url: "https://pennbrenn.com/examguard.html", desc: "WE R WATCHIN U POOOOOP" },
    { name: "galactick.hmtl", url: "https://pennbrenn.com/galactic_navigator.html", desc: "flyin into a blak hole" },
    { name: "404_fail.hmtl", url: "https://pennbrenn.com/404.html", desc: "ur fater is missing" },
    { name: "midnite.hmtl", url: "https://pennbrenn.com/midnight_drive.html", desc: "vroom vroom screeech" },
    { name: "studdy.hmtl", url: "https://pennbrenn.com/study.html", desc: "lern how 2 b dummer" },
    { name: "labb_rats.hmtl", url: "https://pennbrenn.com/lab.html", desc: "boom boom syence" },
    { name: "spayce.hmtl", url: "https://pennbrenn.com/space.html", desc: "no air only screaming" },
    { name: "fly_guy.hmtl", url: "https://pennbrenn.com/fly.html", desc: "i hav wings made of trash" },
    { name: "snek_code.pie", url: "https://pennbrenn.com/shit.py", desc: "it dose nuthing but bite" },
    { name: "eye_blede.png", url: "https://pennbrenn.com/randombullshitattack.png", desc: "LOOK AT IT!!!!" },
    { name: "jlc_mystery.hmtl", url: "https://pennbrenn.com/jlc.html", desc: "wat is dis?? idunno" },
    { name: "screm.hmtl", url: "https://pennbrenn.com/a.html", desc: "AAAAAAAAAAAAAAAA" },
    { name: "zuck_spy.hmtl", url: "https://pennbrenn.com/FB.html", desc: "meta is eating ur thouts" },
    { name: "pet_vyrus.js", url: "https://pennbrenn.com/pet.js", desc: "good doggy *infects u*" },
    { name: "tag_hell.hmtl", url: "https://pennbrenn.com/tags.html", desc: "too meny labels lol" }
  ];

  function buildDirectory() {
    const container = document.getElementById('directory-container');
    files.forEach((file) => {
      const a = document.createElement('a');
      a.href = file.url;
      a.className = 'file-link';
      a.innerHTML = `<b>${file.name}</b><br><small>${file.desc}</small>`;
      a.style.top = Math.random() * 70 + 10 + '%';
      a.style.left = Math.random() * 70 + 10 + '%';
      
      // THE HYDRA CLICK: Spawns random 3 to 10 tabs of the same link
      a.onclick = function(e) {
        e.preventDefault(); // Stop normal click
        const tabCount = Math.floor(Math.random() * 8) + 3; // 3 to 10 tabs
        for(let i=0; i<tabCount; i++) {
          window.open(this.href, '_blank');
        }
        window.location.href = this.href; // Finally redirect main page
      };

      container.appendChild(a);
    });

    // Drunken Movement
    setInterval(() => {
      document.querySelectorAll('.file-link').forEach(link => {
        const top = parseFloat(link.style.top);
        const left = parseFloat(link.style.left);
        link.style.top = (top + (Math.random() - 0.5) * 6) + '%';
        link.style.left = (left + (Math.random() - 0.5) * 6) + '%';
      });
    }, 150);
  }

  // --- 5. DEATH TIMER ---
  function startDeathTimer() {
    let timeLeft = 10;
    const timerDisplay = document.getElementById('time');
    const countdown = setInterval(() => {
      timeLeft--;
      timerDisplay.innerText = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(countdown);
        // On timer death, also do the Hydra tab blast!
        const randomUrl = files[Math.floor(Math.random() * files.length)].url;
        for(let i=0; i<5; i++) window.open(randomUrl, '_blank');
        window.location.href = randomUrl;
      }
    }, 1000);
  }
</script>

</body>
</html>
