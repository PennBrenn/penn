<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PENN BRENN: SOUL EXTINCTION EDITION</title>
<style>
  :root { --flash: 0.03s; }
  
  body {
    background: #000;
    margin: 0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    font-family: "Wingdings", "Comic Sans MS", cursive;
    animation: worldEnd 0.05s infinite;
  }

  @keyframes worldEnd {
    0% { background: #ff0000; filter: hue-rotate(0deg) invert(0); }
    50% { background: #0000ff; filter: hue-rotate(180deg) invert(1); }
    100% { background: #00ff00; filter: hue-rotate(360deg) invert(0); }
  }

  /* EPILEPSY WARNING MINEFIELD */
  #seizure-warning {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 999999;
    background: black;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 80px;
    text-align: center;
    animation: warningFlash 0.1s infinite;
    pointer-events: none;
  }
  @keyframes warningFlash {
    0%, 100% { opacity: 1; background: red; color: yellow; transform: scale(1.5); }
    50% { opacity: 0.5; background: blue; color: lime; transform: scale(0.5) rotate(10deg); }
  }

  /* THE TIMER */
  #death-timer {
    position: fixed;
    top: 10px; right: 10px;
    background: white; color: black;
    font-size: 50px; padding: 20px;
    border: 10px solid red;
    z-index: 10000;
    animation: jitter 0.1s infinite;
  }

  /* CHAOTIC POPUPS */
  .popup {
    position: absolute;
    width: 200px; height: 150px;
    background: silver; border: 4px outset white;
    box-shadow: 10px 10px 0px black;
    z-index: 8888;
    padding: 10px;
    animation: drift 2s infinite alternate;
  }

  @keyframes drift {
    from { transform: translate(0,0) rotate(0deg); }
    to { transform: translate(100px, 100px) rotate(360deg); }
  }

  /* FILE NODES */
  .file-link {
    position: absolute;
    padding: 15px;
    background: rgba(255,255,255,0.8);
    border: 5px dashed black;
    text-decoration: none;
    color: blue;
    font-weight: bold;
    font-size: 20px;
    z-index: 100;
    transition: all 0.05s linear;
  }

  .file-link:hover {
    background: black;
    color: white;
    transform: scale(5) rotate(720deg);
    z-index: 100000;
  }

  marquee {
    position: fixed;
    font-size: 100px;
    opacity: 0.4;
    z-index: 1;
    pointer-events: none;
  }

  @keyframes jitter {
    0% { transform: translate(0,0); }
    50% { transform: translate(15px, -15px); }
    100% { transform: translate(-15px, 15px); }
  }
</style>
</head>
<body onclick="spawnPopup()">

<div id="seizure-warning">
    !!!!! MASSIVE EPILEPPSY WARNNING !!!!!<br>
    UR BRAIN IS GOING TO MELTTTTT<br>
    PENN BRENN IS HEERE
</div>

<div id="death-timer">PICK OR DIE: <span id="time">10</span></div>

<marquee scrollamount="60" style="top:20%;">GOOOOOOOO FASSSTTTTTT</marquee>
<marquee scrollamount="40" direction="right" style="bottom:20%;">NO SOUL LEFT HEERE</marquee>

<div id="directory-container"></div>

<script>
  const files = [
    { name: "indux.htlm", url: "pennbrenn.com/index.html", desc: "da mane page 4 chaos" },
    { name: "exxam_gard.hmtl", url: "pennbrenn.com/examguard.html", desc: "WE R WATCHIN U POOOOOP" },
    { name: "galactick.hmtl", url: "pennbrenn.com/galactic_navigator.html", desc: "flyin into a blak hole" },
    { name: "404_fail.hmtl", url: "pennbrenn.com/404.html", desc: "ur fater is missing" },
    { name: "midnite.hmtl", url: "pennbrenn.com/midnight_drive.html", desc: "vroom vroom screeech" },
    { name: "studdy.hmtl", url: "pennbrenn.com/study.html", desc: "lern how 2 b dummer" },
    { name: "labb_rats.hmtl", url: "pennbrenn.com/lab.html", desc: "boom boom syence" },
    { name: "spayce.hmtl", url: "pennbrenn.com/space.html", desc: "no air only screaming" },
    { name: "fly_guy.hmtl", url: "pennbrenn.com/fly.html", desc: "i hav wings made of trash" },
    { name: "snek_code.pie", url: "pennbrenn.com/shit.py", desc: "it dose nuthing but bite" },
    { name: "eye_blede.png", url: "pennbrenn.com/randombullshitattack.png", desc: "LOOK AT IT!!!!" },
    { name: "jlc_mystery.hmtl", url: "pennbrenn.com/jlc.html", desc: "wat is dis?? idunno" },
    { name: "screm.hmtl", url: "pennbrenn.com/a.html", desc: "AAAAAAAAAAAAAAAA" },
    { name: "zuck_spy.hmtl", url: "pennbrenn.com/FB.html", desc: "meta is eating ur thouts" },
    { name: "pet_vyrus.js", url: "pennbrenn.com/pet.js", desc: "good doggy *infects u*" },
    { name: "tag_hell.hmtl", url: "pennbrenn.com/tags.html", desc: "too meny labels lol" }
  ];

  const container = document.getElementById('directory-container');

  // Create links
  files.forEach((file, i) => {
    const a = document.createElement('a');
    a.href = "https://" + file.url;
    a.className = 'file-link';
    a.innerHTML = `<b>${file.name}</b><br><small>${file.desc}</small>`;
    a.style.top = Math.random() * 80 + 5 + '%';
    a.style.left = Math.random() * 80 + 5 + '%';
    container.appendChild(a);
  });

  // Drunken Physics: Move links constantly
  setInterval(() => {
    document.querySelectorAll('.file-link').forEach(link => {
      const top = parseFloat(link.style.top);
      const left = parseFloat(link.style.left);
      link.style.top = (top + (Math.random() - 0.5) * 5) + '%';
      link.style.left = (left + (Math.random() - 0.5) * 5) + '%';
    });
  }, 100);

  // POPUP SPAMMER
  function spawnPopup() {
    const p = document.createElement('div');
    p.className = 'popup';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.left = Math.random() * 100 + 'vw';
    p.innerHTML = `<b>ERRROR!</b><br>UR BALLS ARE WAITING!<br><button onclick="this.parentElement.remove()">CLOSE (LIE)</button>`;
    document.body.appendChild(p);
  }
  setInterval(spawnPopup, 1500);

  // THE DEATH TIMER
  let timeLeft = 10;
  const timerDisplay = document.getElementById('time');
  const countdown = setInterval(() => {
    timeLeft--;
    timerDisplay.innerText = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(countdown);
      const randomFile = files[Math.floor(Math.random() * files.length)].url;
      window.location.href = "https://" + randomFile;
    }
  }, 1000);

  // Remove warning after 3 seconds so you can "see" the chaos
  setTimeout(() => {
    document.getElementById('seizure-warning').style.display = 'none';
  }, 3000);
</script>

</body>
</html>
